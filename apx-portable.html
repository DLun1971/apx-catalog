<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX Portable Accessory Catalog</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px;background:#f4f6f9;color:#222}
#topbar{background:#0C2D5A;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;position:sticky;top:0;z-index:100}
#topbar .logo{font-size:15px;font-weight:700;letter-spacing:.5px}
#topbar .nav-links{display:flex;gap:16px}
#topbar .nav-links a{color:#ccd9ea;text-decoration:none;font-size:12px}
#topbar .nav-links a:hover{color:#fff}
#radio-panel{background:#112240;padding:16px 20px 12px;border-bottom:3px solid #185FA5}
.pill-group-label{color:#7a9cc0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:10px}
.pill-group-label:first-child{margin-top:0}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.rpill{background:rgba(255,255,255,0.08);color:#ccd9ea;border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.rpill:hover{background:rgba(255,255,255,0.15);color:#fff}
.rpill.active{background:#185FA5;border-color:#2478c5;color:#fff;font-weight:600}
#variant-strip{display:none;margin-top:10px}
#variant-strip .vstrip-label{color:#7a9cc0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.vpill{background:rgba(255,255,255,0.06);color:#a8c0d8;border:1px solid rgba(255,255,255,0.14);border-radius:14px;padding:3px 12px;cursor:pointer;font-size:11px;display:inline-block;margin-right:4px;margin-bottom:4px;transition:all .15s;user-select:none}
.vpill:hover{background:rgba(255,255,255,0.13);color:#fff}
.vpill.active{background:#1e6bb5;border-color:#2d82d2;color:#fff;font-weight:600}
#content-area{background:#fff;margin:0}
#cat-bar{background:#f0f4f8;border-bottom:1px solid #dde3eb;padding:8px 20px;display:none;flex-wrap:wrap;gap:6px}
.catpill{background:#fff;border:1px solid #c5cdd8;border-radius:14px;padding:4px 13px;font-size:12px;cursor:pointer;color:#445;transition:all .15s;user-select:none}
.catpill:hover{background:#e8eef5;border-color:#185FA5}
.catpill.active{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600}
#toolbar{display:none;align-items:center;padding:8px 20px;gap:12px;border-bottom:1px solid #dde3eb;background:#fafbfc}
#breadcrumb{font-size:12px;color:#667;flex:1}
#breadcrumb span{color:#185FA5;font-weight:500}
#search-box{padding:5px 10px;border:1px solid #c5cdd8;border-radius:6px;font-size:12px;width:220px;outline:none}
#search-box:focus{border-color:#185FA5}
#tables-area{padding:0 20px 40px}
.section-block{margin-top:24px}
.section-title{font-size:13px;font-weight:700;color:#0C2D5A;border-bottom:2px solid #185FA5;padding-bottom:4px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
.acc-table{width:100%;border-collapse:collapse;font-size:12px}
.acc-table th{background:#0C2D5A;color:#fff;padding:6px 10px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap}
.acc-table th.center,.acc-table td.center{text-align:center}
.acc-table tr:nth-child(even){background:#f7f9fb}
.acc-table tr:hover{background:#edf2f8}
.acc-table td{padding:5px 10px;border-bottom:1px solid #e8ecf0;vertical-align:middle}
.acc-table td.part{font-family:monospace;font-size:11px;color:#185FA5;white-space:nowrap;cursor:pointer}
.acc-table td.part:hover{text-decoration:underline}
.badge{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-ip{background:#dbeafe;color:#1e40af}
.badge-hz{background:#fef3c7;color:#92400e}
.chk{color:#16a34a;font-size:13px}
.x{color:#aaa;font-size:11px}
#no-radio{padding:60px 20px;text-align:center;color:#778;font-size:14px}
#no-radio h3{color:#0C2D5A;margin-bottom:8px}
</style>
</head>
<body>
<div id="topbar">
<div class="logo">Motorola Solutions — APX Portable Accessory Catalog</div>
<div class="nav-links"><a href="#">Home</a><a href="#">My List</a></div>
</div>
<div id="radio-panel">
<div class="pill-group-label">APX N-Line</div>
<div class="pill-row">
<div class="rpill" onclick="selectRadio(this,'apx-next')" data-key="apx-next">APX NEXT</div>
<div class="rpill" onclick="selectRadio(this,'apx-n70')" data-key="apx-n70">APX N70</div>
<div class="rpill" onclick="selectRadio(this,'apx-n50')" data-key="apx-n50">APX N50</div>
</div>
<div class="pill-group-label">Classic APX</div>
<div class="pill-row">
<div class="rpill" onclick="selectRadio(this,'apx-8000')" data-key="apx-8000">APX 8000</div>
<div class="rpill" onclick="selectRadio(this,'apx-7000')" data-key="apx-7000">APX 7000</div>
<div class="rpill" onclick="selectRadio(this,'apx-6000')" data-key="apx-6000">APX 6000</div>
<div class="rpill" onclick="selectRadio(this,'apx-compact')" data-key="apx-compact">APX Compact</div>
</div>
<div class="pill-group-label">SRX Series</div>
<div class="pill-row">
<div class="rpill" onclick="selectRadio(this,'apx-srx2200')" data-key="apx-srx2200">SRX2200</div>
</div>
<div id="variant-strip">
<div class="vstrip-label">Variant</div>
<div id="variant-pills"></div>
</div>
</div>
<div id="content-area">
<div id="cat-bar"></div>
<div id="toolbar"><div id="breadcrumb">Select a radio to begin</div><input id="search-box" type="text" placeholder="Search part # or description..." oninput="renderTables()"></div>
<div id="no-radio"><h3>APX Portable Accessory Catalog</h3><p>Select a radio family above to view compatible accessories.</p></div>
<div id="tables-area"></div>
</div>
<script src="data/apx-next-data.js"></script>
<script src="data/apx-n70-data.js"></script>
<script src="data/apx-n50-data.js"></script>
<script src="data/apx-8000-data.js"></script>
<script src="data/apx-7000-data.js"></script>
<script src="data/apx-6000-data.js"></script>
<script src="data/apx-compact-data.js"></script>
<script src="data/apx-srx2200-data.js"></script>
<script>
var APX_RADIOS = {
  "apx-next":    { label:"APX NEXT",    variants:[], dataVar:"APX_NEXT_DATA" },
  "apx-n70":     { label:"APX N70",     variants:[], dataVar:"APX_N70_DATA" },
  "apx-n50":     { label:"APX N50",     variants:[], dataVar:"APX_N50_DATA" },
  "apx-8000":    { label:"APX 8000",    variants:["8000","8000XE","8000H","8000HXE"], dataVar:"APX_8000_DATA" },
  "apx-7000":    { label:"APX 7000",    variants:["7000","7000XE"], dataVar:"APX_7000_DATA" },
  "apx-6000":    { label:"APX 6000",    variants:["6000","6000XE","5000"], dataVar:"APX_6000_DATA" },
  "apx-compact": { label:"APX Compact", variants:["4000","3000","2000","1000","1000i","900"], dataVar:"APX_COMPACT_DATA" },
  "apx-srx2200": { label:"SRX2200",     variants:[], dataVar:"APX_SRX2200_DATA" }
};
var APX_CATS = ["RSM","Surveillance","Headsets","Tactical","Wireless","Batteries","Chargers","Carry","Antennas","Cables"];
var COLS_BY_SECTION = {
  "RSM":["desc","part","impres","intel_audio","ai_noise","windporting","noise_cancel","full_duplex","vol_ctrl","prog_btn","audio_jack","ip","hazloc"],
  "Surveillance":["desc","part","impres","intel_audio","ai_noise","ear_type","mic_type","full_duplex","hazloc"],
  "Headsets":["desc","part","impres","headset_type","ear_style","nrr_db","mic_type","hazloc"],
  "Tactical":["desc","part","impres","hazloc"],
  "Wireless":["desc","part","ear_type","mic_type","ptt","talk_time_hr","charge_time_hr","weight_g"],
  "Batteries":["desc","part","impres","chem","capacity_mah","dims_mm","weight_g","hazloc","ip","op_temp"],
  "Chargers":["desc","part","impres","chem","pwr_src","dims_mm","pockets"],
  "Carry":["desc","part","material","belt_sz","swivel","display","d_rings"],
  "Antennas":["desc","part","band","freq_mhz","len_cm","ant_type"],
  "Cables":["desc","part"]
};
var COL_LABELS = {
  desc:"Description",part:"Part #",impres:"IMPRES",intel_audio:"Intel Audio",
  ai_noise:"AI Noise",windporting:"Windporting",noise_cancel:"Noise Cancel",
  full_duplex:"Full Duplex",vol_ctrl:"Vol Ctrl",prog_btn:"Prog Btn",
  audio_jack:"Audio Jack",ip:"IP",hazloc:"HazLoc",
  ear_type:"Ear Type",mic_type:"Mic Type",headset_type:"Type",
  ear_style:"Ear Style",nrr_db:"NRR dB",
  ptt:"PTT",talk_time_hr:"Talk (hr)",charge_time_hr:"Charge (hr)",weight_g:"Weight (g)",
  chem:"Chemistry",capacity_mah:"mAh",dims_mm:"Dims (mm)",op_temp:"Op Temp",
  pwr_src:"Power",pockets:"Pockets",
  material:"Material",belt_sz:"Belt Sz",swivel:"Swivel",display:"Display",d_rings:"D-Rings",
  band:"Band",freq_mhz:"Freq (MHz)",len_cm:"Length (cm)",ant_type:"Type"
};
var BOOL_COLS = ["impres","intel_audio","ai_noise","windporting","noise_cancel","full_duplex","vol_ctrl","swivel","display","d_rings","ptt"];
var currentRadioKey = null;
var currentVariant = null;
var currentCat = "RSM";
function selectRadio(el,key){
  document.querySelectorAll(".rpill").forEach(function(p){p.classList.remove("active");});
  el.classList.add("active");
  currentRadioKey = key;
  var radio = APX_RADIOS[key];
  if(radio.variants && radio.variants.length > 1){
    currentVariant = radio.variants[0];
    buildVariantStrip(radio.variants);
  } else {
    currentVariant = null;
    document.getElementById("variant-strip").style.display = "none";
  }
  currentCat = "RSM";
  document.getElementById("no-radio").style.display = "none";
  document.getElementById("cat-bar").style.display = "flex";
  document.getElementById("toolbar").style.display = "flex";
  buildCatBar();
  renderTables();
}
function buildVariantStrip(variants){
  var strip = document.getElementById("variant-strip");
  var pillsDiv = document.getElementById("variant-pills");
  pillsDiv.innerHTML = "";
  for(var i=0;i<variants.length;i++){
    var v = variants[i];
    var d = document.createElement("div");
    d.className = "vpill" + (v===currentVariant?" active":"");
    d.textContent = v;
    d.setAttribute("data-v",v);
    d.onclick = (function(vv){return function(){selectVariant(vv);};})(v);
    pillsDiv.appendChild(d);
  }
  strip.style.display = "block";
}
function selectVariant(v){
  currentVariant = v;
  document.querySelectorAll(".vpill").forEach(function(p){
    p.classList.toggle("active",p.getAttribute("data-v")===v);
  });
  renderTables();
}
function buildCatBar(){
  var bar = document.getElementById("cat-bar");
  bar.innerHTML = "";
  for(var i=0;i<APX_CATS.length;i++){
    var c = APX_CATS[i];
    var d = document.createElement("div");
    d.className = "catpill" + (c===currentCat?" active":"");
    d.textContent = c;
    d.setAttribute("data-c",c);
    d.onclick = (function(cc){return function(){selectCat(cc);};})(c);
    bar.appendChild(d);
  }
}
function selectCat(c){
  currentCat = c;
  document.querySelectorAll(".catpill").forEach(function(p){
    p.classList.toggle("active",p.getAttribute("data-c")===c);
  });
  renderTables();
}
function getData(){
  var radio = APX_RADIOS[currentRadioKey];
  var raw = window[radio.dataVar];
  if(!raw) return [];
  if(Array.isArray(raw)) return raw;
  if(raw.categories){
    var flat = [];
    var cats = Object.keys(raw.categories);
    for(var i=0;i<cats.length;i++){
      var catName = cats[i];
      var rows = raw.categories[catName];
      for(var j=0;j<rows.length;j++){
        var row = rows[j];
        row.category = catName;
        flat.push(row);
      }
    }
    return flat;
  }
  return [];
}
function matchesVariant(row){
  if(!currentVariant) return true;
  if(!row.variants || row.variants.length === 0) return true;
  for(var i=0;i<row.variants.length;i++){
    if(row.variants[i]===currentVariant) return true;
  }
  return false;
}
function renderCellVal(col,val){
  if(BOOL_COLS.indexOf(col)>=0){
    if(val===true||val===1||val==="1"||val==="yes") return "<span class=\"chk\">✔</span>";
    return "<span class=\"x\">—</span>";
  }
  if(col==="ip") return val?"<span class=\"badge badge-ip\">"+val+"</span>":"<span class=\"x\">—</span>";
  if(col==="hazloc") return val?"<span class=\"badge badge-hz\">"+val+"</span>":"<span class=\"x\">—</span>";
  if(val===null||val===undefined||val==="") return "<span class=\"x\">—</span>";
  return val;
}
function renderTables(){
  if(!currentRadioKey) return;
  var radio = APX_RADIOS[currentRadioKey];
  var searchVal = (document.getElementById("search-box").value||"").toLowerCase();
  var allData = getData();
  var cols = COLS_BY_SECTION[currentCat]||["desc","part"];
  var rows = [];
  for(var i=0;i<allData.length;i++){
    var row = allData[i];
    if((row.category||row.cat||"")!==currentCat) continue;
    if(!matchesVariant(row)) continue;
    if(searchVal){
      var hay=((row.desc||"")+" "+(row.part||"")).toLowerCase();
      if(hay.indexOf(searchVal)<0) continue;
    }
    rows.push(row);
  }
  var bc = document.getElementById("breadcrumb");
  bc.innerHTML = "<span>"+radio.label+"</span> › "+currentCat+(currentVariant?" › "+currentVariant:"");
  var area = document.getElementById("tables-area");
  if(rows.length===0){
    area.innerHTML = "<div style=\"padding:40px 0;text-align:center;color:#889\">No accessories found for this selection.</div>";
    return;
  }
  var html = "<div class=\"section-block\">";
  html += "<div class=\"section-title\">"+currentCat+"</div>";
  html += "<table class=\"acc-table\"><thead><tr>";
  for(var ci=0;ci<cols.length;ci++){
    var ckey=cols[ci];
    var isC=BOOL_COLS.indexOf(ckey)>=0||ckey==="ip"||ckey==="hazloc";
    html += "<th"+(isC?" class=\"center\"":"")+">"+( COL_LABELS[ckey]||ckey)+"</th>";
  }
  html += "</tr></thead><tbody>";
  for(var ri=0;ri<rows.length;ri++){
    var r=rows[ri];
    html += "<tr>";
    for(var ci2=0;ci2<cols.length;ci2++){
      var ck=cols[ci2];
      var isC2=BOOL_COLS.indexOf(ck)>=0||ck==="ip"||ck==="hazloc";
      if(ck==="part") html += "<td class=\"part center\" onclick=\"copyPart(this)\">"+( r.part||"")+"</td>";
      else if(ck==="desc") html += "<td style=\"min-width:200px\">"+( r.desc||"")+"</td>";
      else html += "<td"+(isC2?" class=\"center\"":"")+">"+renderCellVal(ck,r[ck])+"</td>";
    }
    html += "</tr>";
  }
  html += "</tbody></table></div>";
  area.innerHTML = html;
}
function copyPart(el){
  var t=el.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(t);}
  el.style.background="#d1fae5";
  setTimeout(function(){el.style.background="";},600);
}
</script>
</body></html>
