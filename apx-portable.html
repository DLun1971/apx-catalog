<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;min-height:100vh;overflow-y:auto}
#topbar{background:#0C2D5A;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
#topbar-left{display:flex;align-items:center;gap:12px}
#brand{color:#fff;font-size:15px;font-weight:500;letter-spacing:0.01em}
#mylist-pill{display:flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:5px 16px;cursor:pointer;color:#fff;font-size:12px;user-select:none}
#mylist-pill:hover{background:rgba(255,255,255,0.1)}

#mylist-count{background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 7px;font-size:11px;color:#fff}

.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.rpill{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;user-select:none;transition:background 0.15s,border-color 0.15s}
.rpill:hover{background:rgba(255,255,255,0.1)}
.rpill.active{background:#185FA5;border-color:#185FA5;font-weight:500}
.vpill{padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7);user-select:none;transition:all 0.15s;display:inline-block;margin-right:4px;margin-bottom:4px}
.vpill:hover{background:rgba(255,255,255,0.1);color:#fff}
.vpill.active{background:#1e6bb5;border-color:#2d82d2;color:#fff;font-weight:500}
#variant-strip{display:none;padding:8px 0 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:6px}
#variant-info{display:none;padding:8px 0 0;border-top:1px solid rgba(255,255,255,0.08);margin-top:6px;font-size:11px;color:rgba(255,255,255,0.65);line-height:1.5}
#content-area{background:#fff;border-top:3px solid #185FA5}
#cat-bar{padding:10px 20px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:0.5px solid #e0e0e0}
.cpill{padding:4px 13px;border-radius:14px;font-size:12px;cursor:pointer;border:0.5px solid #ccc;color:#555;background:transparent;user-select:none;transition:all 0.15s}
.cpill:hover{background:#f0f0f0}
.cpill.active{background:#0C2D5A;border-color:#0C2D5A;color:#fff}
#toolbar{padding:8px 20px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #e0e0e0}
#breadcrumb{font-size:12px;color:#777}
#breadcrumb b{color:#222;font-weight:500}
#table-area{padding:0 20px 40px}
.sec-head{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:16px 0 6px;display:flex;align-items:center;gap:8px}
.sec-count{font-weight:400;color:#bbb;text-transform:none;letter-spacing:0;font-size:11px}
.no-items{font-size:13px;color:#aaa;padding:12px 0}
table.acc-table{width:100%;border-collapse:collapse;font-size:12px}
table.acc-table th{text-align:left;padding:7px 10px;border-bottom:1px solid #ddd;font-size:11px;font-weight:500;color:#888;white-space:nowrap;background:#fafafa}
table.acc-table td{padding:8px 10px;border-bottom:0.5px solid #f0f0f0;color:#222;vertical-align:middle}
table.acc-table tr:last-child td{border-bottom:none}
table.acc-table tr:hover td{background:#f9f9f9}
.img-box{width:34px;height:34px;background:#f0f0f0;border-radius:4px;border:0.5px solid #e0e0e0;flex-shrink:0}
.pn{font-family:monospace;font-size:11px;color:#888}
.chk-yes{color:#1D9E75;text-align:center;font-size:13px}
.acc-table td{text-align:center}.acc-table td:nth-child(2){text-align:left}.acc-table td:nth-child(3){text-align:left}
.chk-no{color:#ccc;text-align:center;font-size:13px}
.row-cb{cursor:pointer;width:14px;height:14px}
.spec-tag{display:inline-block;font-size:10px;padding:2px 5px;border-radius:6px;margin-left:3px;vertical-align:middle}
.tag-ip{background:#E6F1FB;color:#0C447C}
.tag-hz{background:#EAF3DE;color:#3B6D11}.tag-ul{background:#EAF3DE;color:#3B6D11}.tag-atex{background:#E6F1FB;color:#0C447C}
#page-wrap{display:flex;align-items:stretch}
#main-col{flex:1;min-width:0}
#radio-sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;align-items:center;padding:24px 16px;position:sticky;top:52px;height:calc(100vh - 52px);overflow:hidden}
#sidebar-img{width:180px;height:180px;object-fit:contain;display:block}
#sidebar-img.hidden{display:none}
#sidebar-placeholder{width:180px;height:180px;background:#f5f5f5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px}
#sidebar-name{margin-top:16px;font-size:14px;font-weight:600;color:#0C2D5A;text-align:center}
#sidebar-type{font-size:11px;color:#888;margin-top:4px;text-align:center}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.2);z-index:999;align-items:center;justify-content:center;cursor:pointer}

#lightbox img{max-width:50vw;max-height:50vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}

<script src="data/apx-compact-data.js?v=1774311202906"></script>
<script src="data/apx-srx2200-data.js?v=1774311202906"></script>
<script>
var NLINE_RADIOS = [{label:"APX NEXT",key:"apx-next"},{label:"APX N70",key:"apx-n70"},{label:"APX N50",key:"apx-n50"}];
var CLASSIC_RADIOS = [{label:"APX 8000",key:"apx-8000"},{label:"APX 7000",key:"apx-7000"},{label:"APX 6000",key:"apx-6000"},{label:"APX Compact",key:"apx-compact"}];
var SRX_RADIOS = [{label:"SRX2200",key:"apx-srx2200"}];
var ALL_RADIOS = NLINE_RADIOS.concat(CLASSIC_RADIOS).concat(SRX_RADIOS);
var RADIO_VARIANTS = {
  "apx-8000":["8000","8000XE","8000H","8000HXE"],
  "apx-7000":["7000","7000XE"],
  "apx-6000":["6000","6000XE","5000"],
  "apx-compact":["4000","3000","2000","1000","1000i","900"]
};
var RADIO_IMAGES = {
  "apx-next":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx-next/apx_next_front.png",
  "apx-n70":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx-n70/apx_n70_front.png",
  "apx-n50":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx-n50/apx_n50_front.png",
  "apx-8000":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx8000/apx_8000_front.png",
  "apx-7000":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx7000/apx_7000_front.png",
  "apx-6000":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx6000/apx_6000_front.png",
  "apx-compact":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/apx4000/apx_4000_front.png",
  "apx-srx2200":"https://www.motorolasolutions.com/content/dam/msi/images/products/two-way-radios/apx/portable-radios/srx2200/srx_2200_front.png"
};
var APX_CATS = ["All","RSM","Surveillance","Headsets","Tactical","Wireless","Batteries","Chargers","Carry","Antennas","Cables"];
var COLS_BY_SECTION = {
  "RSM":         [{key:"impres",label:"IMPRES"},{key:"multi_mic",label:"Multi-Mic"},{key:"viqi",label:"ViQi"},{key:"vol_ctrl",label:"Vol Ctrl"},{key:"orange_btn",label:"Orange Btn"},{key:"ch_ctrl",label:"Ch Ctrl"},{key:"prog_btn",label:"Prog Btn"},{key:"audio_jack",label:"Audio Jack"},{key:"ip",label:"IP"},{key:"hazloc",label:"HazLoc"},{key:"dims_mm",label:"Dims (mm)"}],
  "Surveillance":[{key:"impres",label:"IMPRES"},{key:"ear_type",label:"Ear Type"},{key:"mic_type",label:"Mic Type"},{key:"ptt",label:"PTT"},{key:"hazloc",label:"HazLoc"}],
  "Headsets":    [{key:"impres",label:"IMPRES"},{key:"headset_type",label:"Type"},{key:"ear_style",label:"Ear Style"},{key:"nrr_db",label:"NRR dB"},{key:"mic_type",label:"Mic"},{key:"hazloc",label:"HazLoc"}],
  "Tactical":    [{key:"impres",label:"IMPRES"},{key:"hazloc",label:"HazLoc"}],
  "Wireless":    [{key:"ear_type",label:"Ear Type"},{key:"mic_type",label:"Mic Type"},{key:"ptt",label:"PTT"},{key:"talk_time_hr",label:"Talk (hr)"},{key:"charge_time_hr",label:"Charge (hr)"},{key:"weight_g",label:"Weight (g)"}],
  "Batteries":   [{key:"impres",label:"IMPRES"},{key:"chem",label:"Chemistry"},{key:"capacity_mah",label:"mAh"},{key:"dims_mm",label:"Dims (mm)"},{key:"weight_g",label:"Weight (g)"},{key:"ip",label:"IP"},{key:"hazloc",label:"HazLoc"},{key:"op_temp",label:"Op Temp"}],
  "Chargers":    [{key:"impres",label:"IMPRES"},{key:"chem",label:"Chemistry"},{key:"pwr_src",label:"Power"},{key:"dims_mm",label:"Dims (mm)"},{key:"pockets",label:"Pockets"}],
  "Carry":       [{key:"material",label:"Material"},{key:"belt_sz",label:"Belt Sz"},{key:"swivel",label:"Swivel"},{key:"d_rings",label:"D-Rings"}],
  "Antennas":    [{key:"band",label:"Band"},{key:"freq_mhz",label:"Freq (MHz)"},{key:"len_cm",label:"Length (cm)"},{key:"ant_type",label:"Type"}],
  "Cables":      []
};
var PART_IMAGES = {};
fetch("https://dlun1971.github.io/catalog-files/part-images.json").then(function(r){return r.json();}).then(function(data){Object.assign(PART_IMAGES,data);render();});
var currentRadio = null;
var currentRadioKey = null;
var currentVariant = null;
var currentCat = "All";
var myList = [];
function init(){
  buildPillGroup("nline-pills", NLINE_RADIOS);
  buildPillGroup("classic-pills", CLASSIC_RADIOS);
  buildPillGroup("srx-pills", SRX_RADIOS);
  selectRadio("APX NEXT","apx-next");
}
function buildPillGroup(id, radios){
  var row = document.getElementById(id);
  row.innerHTML = "";
  for(var i=0;i<radios.length;i++){
    var r = radios[i];
    var d = document.createElement("div");
    d.className = "rpill" + (r.key===currentRadioKey?" active":"");
    d.textContent = r.label;
    d.onclick = (function(lbl,k){return function(){selectRadio(lbl,k);};})(r.label,r.key);
    row.appendChild(d);
  }
}
function selectRadio(label,key){
  currentRadio = label;
  currentRadioKey = key;
  currentCat = "All";
  currentVariant = null;
  buildPillGroup("nline-pills",NLINE_RADIOS);
  buildPillGroup("classic-pills",CLASSIC_RADIOS);
  buildPillGroup("srx-pills",SRX_RADIOS);
  buildVariantStrip(key);
  buildCatBar();
  updateSidebar();
  render();
}
function buildVariantStrip(key){
  var strip = document.getElementById("variant-strip");
  var row = document.getElementById("variant-pills-row");
  var variants = RADIO_VARIANTS[key];
  if(!variants||!variants.length){strip.style.display="none";return;}
  row.innerHTML = "";
  currentVariant = variants[0];
  for(var i=0;i<variants.length;i++){
    var v = variants[i];
    var d = document.createElement("div");
    d.className = "vpill"+(v===currentVariant?" active":"");
    d.textContent = v;
    d.setAttribute("data-v",v);
    d.onclick = (function(vv){return function(){selectVariant(vv);};})(v);
    row.appendChild(d);
  }
  strip.style.display = "block";
}
function selectVariant(v){
  currentVariant = v;
  document.querySelectorAll(".vpill").forEach(function(p){p.classList.toggle("active",p.getAttribute("data-v")===v);});
  render();
}
function buildCatBar(){
  var bar = document.getElementById("cat-bar");
  bar.innerHTML = "";
  for(var i=0;i<APX_CATS.length;i++){
    var c = APX_CATS[i];
    var d = document.createElement("div");
    d.className = "cpill"+(c===currentCat?" active":"");
    d.textContent = c;
    d.onclick = (function(cc){return function(){currentCat=cc;buildCatBar();render();};})(c);
    bar.appendChild(d);
  }
}
function updateSidebar(){
  var img = document.getElementById("sidebar-img");
  var ph = document.getElementById("sidebar-placeholder");
  var name = document.getElementById("sidebar-name");
  var url = RADIO_IMAGES[currentRadioKey];
  name.textContent = currentRadio||"";
  if(url){img.src=url;img.classList.remove("hidden");ph.style.display="none";}
  else{img.classList.add("hidden");ph.style.display="flex";}
  document.getElementById("sidebar-acc").style.display="none";
}
function getData(){
  var varMap = {"apx-next":"APX_NEXT_DATA","apx-n70":"APX_N70_DATA","apx-n50":"APX_N50_DATA","apx-8000":"APX_8000_DATA","apx-7000":"APX_7000_DATA","apx-6000":"APX_6000_DATA","apx-compact":"APX_COMPACT_DATA","apx-srx2200":"APX_SRX2200_DATA"};
  var raw = window[varMap[currentRadioKey]];
  if(!raw) return [];
  if(Array.isArray(raw)) return raw;
  var CAT_NAMES = ["RSM","Surveillance","Headsets","Tactical","Wireless","Batteries","Chargers","Carry","Antennas","Cables"];
  var flat=[];
  if(raw.categories){
    var cats=Object.keys(raw.categories);
    for(var i=0;i<cats.length;i++){
      var cn=cats[i];var rows=raw.categories[cn];
      if(Array.isArray(rows)){for(var j=0;j<rows.length;j++){rows[j].category=cn;flat.push(rows[j]);}}
      else if(rows && rows.items){for(var j=0;j<rows.items.length;j++){rows.items[j].category=cn;flat.push(rows.items[j]);}}
      else if(rows && rows.rows){for(var j=0;j<rows.rows.length;j++){rows.rows[j].category=cn;flat.push(rows.rows[j]);}}
    }
    return flat;
  }
  for(var i=0;i<CAT_NAMES.length;i++){
    var cn=CAT_NAMES[i];var rows=raw[cn];
    if(Array.isArray(rows)){for(var j=0;j<rows.length;j++){rows[j].category=cn;flat.push(rows[j]);}}
  }
  return flat;
}
function matchesVariant(row){
  if(!currentVariant) return true;
  if(!row.variants||!row.variants.length) return true;
  for(var i=0;i<row.variants.length;i++){if(row.variants[i]===currentVariant)return true;}
  return false;
}
function render(){
  var area = document.getElementById("table-area");
  var search = document.getElementById("search-input").value.toLowerCase().trim();
  if(search.length>0){renderGlobalSearch(search,area);return;}
  var bc = document.getElementById("breadcrumb");
  bc.innerHTML = (currentRadio||"") + " › <b>" + currentCat + "</b>";
  var allData = getData();
  if(!allData.length){area.innerHTML="<div class='no-items'>No data available for this radio.</div>";return;}
  var sections = [];
  var catsToShow = currentCat==="All" ? APX_CATS.filter(function(c){return c!=="All";}) : [currentCat];
  for(var ci=0;ci<catsToShow.length;ci++){
    var cat = catsToShow[ci];
    var items = allData.filter(function(r){return r.category===cat && matchesVariant(r);});
    if(items.length) sections.push({name:cat,items:items,cols:COLS_BY_SECTION[cat]||[]});
  }
  if(!sections.length){area.innerHTML="<div class='no-items'>No accessories found.</div>";return;}
  area.innerHTML = buildSectionsHTML(sections);
}
function renderGlobalSearch(search,area){
  var total=0;var html="";
  for(var ri=0;ri<ALL_RADIOS.length;ri++){
    var r=ALL_RADIOS[ri];
    var saved=currentRadioKey;currentRadioKey=r.key;
    var allData=getData();currentRadioKey=saved;
    var items=allData.filter(function(row){return((row.desc||"")+" "+(row.part||"")).toLowerCase().indexOf(search)>=0;});
    if(!items.length) continue;
    total+=items.length;
    html+="<div class='sec-head' style='background:#f0f4fa;padding:8px 10px;border-radius:4px;margin-top:16px;color:#0C2D5A;font-size:12px;font-weight:600;text-transform:none;letter-spacing:0'>"+r.label+" <span class='sec-count'>— "+items.length+" item"+(items.length!==1?"s":"")+"</span></div>";
    var grouped={};
    for(var ii=0;ii<items.length;ii++){var cat=items[ii].category||"Other";if(!grouped[cat])grouped[cat]=[];grouped[cat].push(items[ii]);}
    var gkeys=Object.keys(grouped);
    for(var gi=0;gi<gkeys.length;gi++){html+=buildSectionsHTML([{name:gkeys[gi],items:grouped[gkeys[gi]],cols:COLS_BY_SECTION[gkeys[gi]]||[]}]);}
  }
  var bc=document.getElementById("breadcrumb");
  bc.innerHTML=total?"Search: <b>"+search+"</b> › "+total+" result"+(total!==1?"s":""):"Search: <b>"+search+"</b> › No results";
  area.innerHTML=total?html:"<div class='no-items'>No accessories found matching "+search+".</div>";
}
function buildSectionsHTML(sections){
  var html="";
  for(var si=0;si<sections.length;si++){
    var sec=sections[si];
    var cols=sec.cols||[];
    html+="<div class='sec-head'>"+sec.name+" <span class='sec-count'>— "+sec.items.length+" item"+(sec.items.length!==1?"s":"")+"</span></div>";
    html+="<table class='acc-table'><thead><tr>";
    html+="<th style='width:42px'></th><th>Description</th><th>Part #</th>";
    for(var ci=0;ci<cols.length;ci++){html+="<th style='text-align:center'>"+(cols[ci].label||cols[ci])+"</th>";}
    html+="<th style='width:36px'></th></tr></thead><tbody>";
    for(var ii=0;ii<sec.items.length;ii++){
      var item=sec.items[ii];
      var pn=item.part||item.pn||"";
      var desc=item.desc||item.description||"";
      var inList=myList.indexOf(pn)>=0;
      var thumbUrl=PART_IMAGES[pn]||"";
      if(!thumbUrl){var base=pn.replace(/[A-D]$/,"").replace(/0[1-4]$/,"");if(base!==pn)thumbUrl=PART_IMAGES[base]||"";}
      if(!thumbUrl){var sfx=["A","B","C","D","01","02","03","04"];for(var si2=0;si2<sfx.length;si2++){if(PART_IMAGES[pn+sfx[si2]]){thumbUrl=PART_IMAGES[pn+sfx[si2]];break;}}}
      html+="<tr style='cursor:pointer' onclick='showAccSidebar(this)' data-pn='"+pn+"' data-desc='"+desc.replace(/'/g,' ')+"'>";
      html+="<td>"+(thumbUrl?"<img src='"+thumbUrl+"' style='width:34px;height:34px;object-fit:contain;border-radius:4px;border:0.5px solid #e0e0e0'>":"<div class='img-box'></div>")+"</td>";
      html+="<td>"+desc+"</td>";
      html+="<td class='pn' title='Click to copy' style='cursor:pointer' onclick='copyPN(this)' data-pn='"+pn+"'>"+pn+"</td>";
      for(var ci2=0;ci2<cols.length;ci2++){
        var ck=cols[ci2].key||cols[ci2];
        var v=item[ck];
        if(v===true) html+="<td class='chk-yes'>&#10003;</td>";
        else if(v===false||v===null||v===undefined||v==="") html+="<td class='chk-no'>—</td>";
        else if(ck==="ip") html+="<td><span class='spec-tag tag-ip'>"+v+"</span></td>";
        else if(ck==="hazloc") html+="<td>"+(v==="UL"?"<span class='spec-tag tag-ul'>UL</span>":v==="ATEX"?"<span class='spec-tag tag-atex'>ATEX</span>":"<span class='spec-tag tag-hz'>"+v+"</span>")+"</td>";
        else html+="<td>"+v+"</td>";
      }
      html+="<td><input type='checkbox' class='row-cb'"+(inList?" checked":"")+" onchange='toggleItem(this)' data-pn='"+pn+"'></td>";
      html+="</tr>";
    }
    html+="</tbody></table>";
  }
  return html;
}
function showAccSidebar(el){var pn=el?el.getAttribute("data-pn")||"":"";var desc=el?el.getAttribute("data-desc")||"":"";
  var url=PART_IMAGES[pn]||"";
  document.getElementById("sidebar-img").classList.add("hidden");
  document.getElementById("sidebar-placeholder").style.display="none";
  document.getElementById("sidebar-name").textContent="";
  var acc=document.getElementById("sidebar-acc");
  var accImg=document.getElementById("sidebar-acc-img");
  acc.style.display="block";
  accImg.src=url;accImg.style.display=url?"block":"none";
  document.getElementById("sidebar-acc-desc").textContent=desc||"";
  document.getElementById("sidebar-acc-pn").textContent=pn||"";
}
function restoreRadioSidebar(){document.getElementById("sidebar-acc").style.display="none";updateSidebar();}
function openLightbox(src){document.getElementById("lightbox-img").src=src;document.getElementById("lightbox").classList.add("open");}
function onSearchInput(){var q=document.getElementById("search-input").value;document.getElementById("search-clear").style.display=q?"inline":"none";render();}
function clearSearch(){document.getElementById("search-input").value="";document.getElementById("search-clear").style.display="none";render();}
function toggleItem(el,checked){var pn=el?el.getAttribute("data-pn")||"":"";
if(checked&&myList.indexOf(pn)<0)myList.push(pn);else if(!checked)myList=myList.filter(function(p){return p!==pn;});document.getElementById("mylist-count").textContent=myList.length;}
function copyPN(el){var pn=el?el.getAttribute("data-pn")||el.textContent||"":"";
navigator.clipboard&&navigator.clipboard.writeText(pn);var orig=el.textContent;el.textContent="Copied!";el.style.color="#1D9E75";setTimeout(function(){el.textContent=orig;el.style.color="";},1200);}
function findItemByPN(pn){
  for(var ri=0;ri<ALL_RADIOS.length;ri++){
    var saved=currentRadioKey;currentRadioKey=ALL_RADIOS[ri].key;
    var data=getData();currentRadioKey=saved;
    for(var i=0;i<data.length;i++){if((data[i].part||data[i].pn)===pn)return data[i];}
  }
  return null;
}
function toggleMyListPanel(){var p=document.getElementById("mylist-panel");var o=document.getElementById("mylist-overlay");if(p.style.display==="flex"){closeMyListPanel();return;}renderMyListPanel();p.style.display="flex";o.style.display="block";}
function closeMyListPanel(){document.getElementById("mylist-panel").style.display="none";document.getElementById("mylist-overlay").style.display="none";}
function renderMyListPanel(){
  var c=document.getElementById("mylist-items");
  if(!myList.length){c.innerHTML="<div style='color:#aaa;font-size:13px;text-align:center;padding:40px 0'>No items selected</div>";return;}
  var html="";
  for(var i=0;i<myList.length;i++){
    var pn=myList[i];var item=findItemByPN(pn)||{};var thumb=PART_IMAGES[pn]||"";

    html+="<span onclick='removeFromList(this)' data-pn='"+pn+"' style='color:#ccc;cursor:pointer;font-size:18px;flex-shrink:0'>&times;</span></div>";
    html+="<div style='flex:1;min-width:0'><div style='font-family:monospace;font-size:11px;color:#888'>"+pn+"</div><div style='font-size:12px;color:#222;margin-top:2px;line-height:1.3'>"+(item.desc||item.description||"")+"</div></div>";
    html+="<span onclick='removeFromList("+pn+")' style='color:#ccc;cursor:pointer;font-size:18px;flex-shrink:0'>&times;</span></div>";
  }
  c.innerHTML=html;
}
function removeFromList(el){var pn=el?el.getAttribute("data-pn")||"":"";
myList=myList.filter(function(p){return p!==pn;});document.getElementById("mylist-count").textContent=myList.length;renderMyListPanel();render();}
function clearMyList(){myList=[];document.getElementById("mylist-count").textContent=0;renderMyListPanel();render();}

  var win=window.open("","_blank");

  h+="<div class='header'><img src='https://dlun1971.github.io/pcr-catalog/assets/images/motorola-solutions-logo.png' style='height:36px'><h1 style='margin-left:12px;font-size:18px;color:#0C2D5A'>APX Accessory Report</h1><div class='meta'>Generated: "+date+"<br>"+rows.length+" item"+(rows.length!==1?"s":"")+" selected</div></div>";
  h+="<table><thead><tr><th></th><th>Part #</th><th>Description</th><th>IP</th><th>HazLoc</th><th>IMPRES</th></tr></thead><tbody>";
  for(var i=0;i<rows.length;i++){var r=rows[i];var thumb=PART_IMAGES[r.pn]?"<img class='thumb' src='"+PART_IMAGES[r.pn]+"'>":"";h+="<tr><td>"+thumb+"</td><td class='pn'>"+r.pn+"</td><td>"+r.desc+"</td><td>"+(r.item.ip||"")+"</td><td>"+(r.item.hazloc||"")+"</td><td>"+(r.item.impres?"Yes":"")+"</td></tr>";}
